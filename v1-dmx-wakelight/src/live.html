<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Wakelight · Live</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f0e8;
    --bg-grad: #ecdfcd;
    --panel: #fdfaf4;
    --panel2: #f2ead9;
    --line: #d8ccb5;
    --line-soft: #e6dbc7;
    --text: #2b2620;
    --muted: #8a7d6b;
    --accent: #cc5500;
    --accent-warm: #d9724a;
    --accent-ink: #ffffff;
    --ok: #6a8f3a;
    --danger: #b64a3a;
    --shadow: 0 1px 2px rgba(58, 43, 24, 0.06), 0 4px 14px rgba(58, 43, 24, 0.07);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; color: var(--text);
    background: radial-gradient(1200px 700px at 10% -10%, var(--bg-grad), var(--bg) 55%);
    background-attachment: fixed;
    font: 16px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased; }
  main { max-width: 560px; margin: 0 auto; padding: max(env(safe-area-inset-top), 20px) 18px 56px; }
  h1 { font: 600 30px/1.1 ui-serif, "Iowan Old Style", "Apple Garamond", Georgia, serif;
    letter-spacing: -0.01em; margin: 0 0 2px; }
  h1 .mark { color: var(--accent); font-style: italic; font-weight: 500; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; font-style: italic; }
  .nav { margin-bottom: 18px; }
  .nav a {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel); color: var(--accent);
    text-decoration: none; border: 1px solid var(--line-soft); padding: 8px 14px;
    border-radius: 999px; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow);
    transition: transform .1s;
  }
  .nav a:hover { transform: translateX(-2px); }
  .card { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 14px;
    padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .slider { display: flex; flex-direction: column; gap: 8px; }
  .slider + .slider { margin-top: 22px; }
  .label-row { display: flex; justify-content: space-between; align-items: baseline; }
  .label-row label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
  .label-row .value { font-size: 17px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 32px; background: transparent;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 8px; border-radius: 999px; background: var(--panel2); border: 1px solid var(--line-soft);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 28px; height: 28px; border-radius: 50%;
    background: var(--panel); margin-top: -11px; border: 2px solid var(--accent);
    box-shadow: 0 2px 6px rgba(58, 43, 24, 0.18);
  }
  input[type=range]::-moz-range-track { height: 8px; border-radius: 999px; background: var(--panel2); }
  input[type=range]::-moz-range-thumb { width: 28px; height: 28px; border-radius: 50%;
    background: var(--panel); border: 2px solid var(--accent); }
  .cct-track input[type=range]::-webkit-slider-runnable-track {
    background: linear-gradient(to right, #ffb070, #ffd9b3, #ffffff, #cfdcff, #9fb6ea);
    border-color: var(--line-soft);
  }
  .gm-track input[type=range]::-webkit-slider-runnable-track {
    background: linear-gradient(to right, #9ecf8b, #fdfaf4, #d784c8);
    border-color: var(--line-soft);
  }
  .conn { font-size: 12px; color: var(--muted); margin-top: 14px; font-variant-numeric: tabular-nums;
    display: inline-flex; align-items: center; gap: 6px; }
  .conn::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: currentColor; }
  .conn.on  { color: var(--ok); }
  .conn.off { color: var(--danger); }
</style>
</head>
<body>
<main>
  <h1>Wake<span class="mark">light</span> · Live</h1>
  <div class="sub">Direct control — schedule pauses while you play here.</div>
  <div class="nav"><a href="/">← Schedule</a></div>

  <div class="card">
    <div class="slider">
      <div class="label-row">
        <label>Brightness</label>
        <span class="value" id="bVal">0%</span>
      </div>
      <input type="range" id="b" min="0" max="100" value="0">
    </div>

    <div class="slider cct-track">
      <div class="label-row">
        <label>Colour temperature</label>
        <span class="value" id="kVal">2700 K</span>
      </div>
      <input type="range" id="k" min="2500" max="10000" step="50" value="2700">
    </div>

    <div class="slider gm-track">
      <div class="label-row">
        <label>Green ↔ Magenta</label>
        <span class="value" id="gVal">0</span>
      </div>
      <input type="range" id="g" min="-100" max="100" step="1" value="0">
    </div>

    <div class="conn off" id="conn">disconnected</div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
let ws = null;
let pending = null;
let sendTimer = null;

function send() {
  if (!ws || ws.readyState !== 1 || !pending) return;
  ws.send(JSON.stringify(pending));
  pending = null;
}

function queue(msg) {
  pending = { ...(pending || {}), ...msg };
  // Throttle to ~30ms so slider drags don't flood the WS.
  if (!sendTimer) {
    sendTimer = setTimeout(() => { sendTimer = null; send(); }, 30);
  }
}

function setConn(on) {
  const el = $('#conn');
  el.textContent = on ? 'connected' : 'disconnected';
  el.classList.toggle('on', on);
  el.classList.toggle('off', !on);
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/live`);
  ws.addEventListener('open', () => { setConn(true); send(); });
  ws.addEventListener('close', () => { setConn(false); setTimeout(connect, 1000); });
  ws.addEventListener('error', () => ws.close());
}

const bEl = $('#b'), kEl = $('#k'), gEl = $('#g');
function refresh() {
  $('#bVal').textContent = `${bEl.value}%`;
  $('#kVal').textContent = `${kEl.value} K`;
  const gv = Number(gEl.value);
  $('#gVal').textContent = gv > 0 ? `+${gv} M` : gv < 0 ? `${gv} G` : '0';
}
function push() {
  queue({ b: Number(bEl.value), k: Number(kEl.value), gm: Number(gEl.value) });
}
[bEl, kEl, gEl].forEach(el => el.addEventListener('input', () => { refresh(); push(); }));

async function seedFromStatus() {
  try {
    const r = await fetch('/api/status');
    const j = await r.json();
    if (typeof j.brightness_pct === 'number') bEl.value = j.brightness_pct;
    if (typeof j.cct_k === 'number')          kEl.value = j.cct_k;
    if (typeof j.gm === 'number')             gEl.value = j.gm;
    refresh();
  } catch (e) { /* leave defaults */ }
}

seedFromStatus();
connect();
</script>
</body>
</html>
