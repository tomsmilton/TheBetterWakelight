; WakeLight — ESP32 DMX sunrise controller for Neewer PL60C
; Build:  pio run
; Flash:  pio run -t upload
; Same firmware runs on the devkit (module build) and the custom PCB
; (both use an ESP32-WROOM-32E class module, DMX TX on GPIO17).

[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    someweisguy/esp_dmx@^4.1.0
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.4

; Bench bring-up only: RS485/DMX output self-check. Links the real
; dmx_engine.cpp + config.cpp against diag/selfcheck.cpp (no Wi-Fi/portal).
;   pio run -e selfcheck -t upload     then watch serial @115200
; Re-flash env:esp32dev to restore production firmware.
[env:selfcheck]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<dmx_engine.cpp> +<config.cpp> +<../diag/selfcheck.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    someweisguy/esp_dmx@^4.1.0
