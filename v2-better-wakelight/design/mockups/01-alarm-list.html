<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>01 · Alarm list</title>
<style>
  :root{
    --bg:#f5f0e8; --grad:#ecdfcd; --panel:#fdfaf4; --panel2:#f2ead9;
    --line:#e6dbc7; --line2:#d8ccb5; --text:#2b2620; --muted:#8a7d6b;
    --accent:#cc5500; --accent2:#d9724a; --ink:#fff; --good:#6a8f3a;
    --shadow:0 1px 2px rgba(58,43,24,.06),0 6px 18px rgba(58,43,24,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--text);
    background:radial-gradient(1200px 700px at 10% -10%,var(--grad),var(--bg) 55%) fixed;
    font:16px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  main{max-width:460px;margin:0 auto;padding:max(env(safe-area-inset-top),22px) 18px 60px}
  .top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px}
  h1{font:600 28px/1 ui-serif,"Iowan Old Style",Georgia,serif;letter-spacing:-.01em;margin:0}
  h1 .m{color:var(--accent);font-style:italic;font-weight:500}
  .lamp{font-size:13px;color:var(--muted)}
  .master{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);margin:14px 0 20px}
  .master .lab{flex:1}
  .master .lab b{display:block;font-size:15px}
  .master .lab span{font-size:12.5px;color:var(--muted)}
  /* switch */
  .sw{--w:52px;--h:30px;position:relative;width:var(--w);height:var(--h);flex:0 0 var(--w)}
  .sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .sw .tr{position:absolute;inset:0;background:#d8ccb5;border-radius:99px;transition:.2s}
  .sw .kn{position:absolute;top:3px;left:3px;width:24px;height:24px;background:#fff;border-radius:50%;
    box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.2s}
  .sw input:checked + .tr{background:var(--accent)}
  .sw input:checked + .tr + .kn{transform:translateX(22px)}
  .seclabel{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);
    font-weight:700;margin:0 4px 10px}
  .alarm{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:16px 16px;margin-bottom:12px;box-shadow:var(--shadow);transition:.15s}
  .alarm.off{opacity:.5}
  .arow{display:flex;align-items:center;gap:14px}
  .time{font:600 34px/1 ui-rounded,system-ui,sans-serif;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .time .ampm{font-size:14px;color:var(--muted);margin-left:4px;font-weight:600}
  .meta{flex:1;min-width:0}
  .days{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .d{font-size:11px;font-weight:700;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;
    background:var(--panel2);color:var(--muted)}
  .d.on{background:var(--accent);color:#fff}
  .sunrise{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--accent);
    background:#fbe9d8;border:1px solid #f3d4b6;padding:3px 9px;border-radius:99px;margin-top:9px}
  .add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:transparent;border:1.5px dashed var(--line2);color:var(--muted);
    border-radius:16px;padding:15px;font:inherit;font-weight:600;cursor:pointer;margin-top:4px}
  .add:hover{border-color:var(--accent);color:var(--accent)}
  .editor{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:none}
  .alarm.open .editor{display:block}
  .editor .frow{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
  .editor .frow label{font-size:14px;color:var(--text)}
  .editor input[type=time]{font:inherit;font-size:15px;background:var(--panel2);border:1px solid var(--line2);
    border-radius:9px;padding:7px 10px}
  .editor input[type=range]{accent-color:var(--accent);width:150px}
  .pickdays{display:flex;gap:6px}
  .pd{font-size:12px;font-weight:700;width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);
    background:var(--panel2);color:var(--muted);cursor:pointer}
  .pd.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chev{color:var(--muted);font-size:13px}
  .foot{text-align:center;margin-top:24px}
  .foot a{color:var(--muted);font-size:13px;text-decoration:none;border-bottom:1px dotted var(--line2)}
</style>
</head>
<body>
<main>
  <div class="top">
    <h1>Wake<span class="m">light</span></h1>
    <div class="lamp">Bedroom ▾</div>
  </div>

  <div class="master">
    <div class="lab"><b>Alarms on</b><span>Next: tomorrow 07:00, gentle sunrise</span></div>
    <label class="sw"><input type="checkbox" checked><span class="tr"></span><span class="kn"></span></label>
  </div>

  <div class="seclabel">Your alarms</div>

  <div class="alarm open" id="a1">
    <div class="arow" onclick="toggleOpen('a1')">
      <div class="time">07:00</div>
      <div class="meta">
        <div class="days">
          <span class="d on">M</span><span class="d on">T</span><span class="d on">W</span>
          <span class="d on">T</span><span class="d on">F</span><span class="d">S</span><span class="d">S</span>
        </div>
        <div class="sunrise">☀ 30 min sunrise</div>
      </div>
      <span class="chev">edit ▾</span>
    </div>
    <div class="editor">
      <div class="frow"><label>Wake time (full brightness)</label><input type="time" value="07:00"></div>
      <div class="frow"><label>Repeat</label>
        <div class="pickdays">
          <button class="pd on">M</button><button class="pd on">T</button><button class="pd on">W</button>
          <button class="pd on">T</button><button class="pd on">F</button><button class="pd">S</button><button class="pd">S</button>
        </div>
      </div>
      <div class="frow"><label>Sunrise length</label><input type="range" min="5" max="60" value="30" oninput="this.nextElementSibling.textContent=this.value+' min'"><span style="font-size:13px;color:var(--muted);min-width:48px;text-align:right">30 min</span></div>
      <div class="frow"><label>Stay on after</label><input type="range" min="0" max="60" value="15" oninput="this.nextElementSibling.textContent=this.value+' min'"><span style="font-size:13px;color:var(--muted);min-width:48px;text-align:right">15 min</span></div>
    </div>
  </div>

  <div class="alarm off" id="a2">
    <div class="arow" onclick="toggleOpen('a2')">
      <div class="time">08:30</div>
      <div class="meta">
        <div class="days">
          <span class="d">M</span><span class="d">T</span><span class="d">W</span>
          <span class="d">T</span><span class="d">F</span><span class="d on">S</span><span class="d on">S</span>
        </div>
        <div class="sunrise">☀ 45 min sunrise</div>
      </div>
      <label class="sw" onclick="event.stopPropagation()"><input type="checkbox"><span class="tr"></span><span class="kn"></span></label>
    </div>
    <div class="editor"></div>
  </div>

  <button class="add">＋ Add alarm</button>

  <div class="foot"><a href="#">Light control · Effects · Settings →</a></div>
</main>
<script>
function toggleOpen(id){document.getElementById(id).classList.toggle('open')}
document.querySelectorAll('.pd').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
</script>
</body>
</html>
