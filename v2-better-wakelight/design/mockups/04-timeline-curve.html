<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>04 · Timeline curve</title>
<style>
  :root{
    --bg:#f5f0e8;--grad:#ecdfcd;--panel:#fdfaf4;--panel2:#f2ead9;
    --line:#e6dbc7;--line2:#d8ccb5;--text:#2b2620;--muted:#8a7d6b;
    --accent:#cc5500;--shadow:0 1px 2px rgba(58,43,24,.06),0 6px 18px rgba(58,43,24,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--text);
    background:radial-gradient(1200px 700px at 10% -10%,var(--grad),var(--bg) 55%) fixed;
    font:16px/1.5 -apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  main{max-width:520px;margin:0 auto;padding:max(env(safe-area-inset-top),22px) 18px 60px}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  h1{font:600 24px/1 ui-serif,Georgia,serif;margin:0}
  h1 .m{color:var(--accent);font-style:italic;font-weight:500}
  .lamp{font-size:13px;color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;
    box-shadow:var(--shadow);margin-bottom:14px}
  .summary{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .summary .tm{font:600 30px/1 ui-rounded,system-ui;letter-spacing:-.02em}
  .summary .dd{font-size:13px;color:var(--muted)}
  .summary .days{margin-left:auto;display:flex;gap:5px}
  .d{font-size:11px;font-weight:700;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;
    background:var(--panel2);color:var(--muted);cursor:pointer}
  .d.on{background:var(--accent);color:#fff}
  .graph{display:block;width:100%;height:180px;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;touch-action:none}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin:10px 2px 0}
  .legend i{display:inline-block;width:14px;height:0;border-top:2.5px solid;vertical-align:middle;margin-right:5px}
  .wps{margin-top:14px}
  .wp{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:10px;align-items:center;
    background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
  .wp .dot{width:13px;height:13px;border-radius:50%;border:1px solid var(--line2)}
  .wp .f label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:3px}
  .wp input{width:100%;font:inherit;font-size:14px;background:var(--panel);border:1px solid var(--line2);
    border-radius:8px;padding:6px 8px}
  .wp .del{background:transparent;border:1px solid var(--line2);color:#b64a3a;border-radius:8px;
    padding:6px 9px;cursor:pointer;font-size:13px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .actions button{font:inherit;font-size:13.5px;font-weight:600;border-radius:10px;padding:9px 13px;cursor:pointer;border:1px solid var(--line2);background:var(--panel2);color:var(--text)}
  .actions .primary{background:var(--accent);color:#fff;border-color:var(--accent);margin-left:auto}
  details{margin-top:6px;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow)}
  summary{cursor:pointer;padding:15px 18px;font-weight:600;font-size:14px;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"▾";float:right;color:var(--muted)}
  details[open] summary::after{content:"▴"}
  .adv{padding:0 18px 18px;color:var(--muted);font-size:13.5px}
  .adv .arow{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);align-items:center}
  .adv .arow span{color:var(--text)}
</style>
</head>
<body>
<main>
  <div class="head"><h1>Wake<span class="m">light</span></h1><span class="lamp">Bedroom ▾</span></div>

  <div class="card">
    <div class="summary">
      <span class="tm">07:00</span><span class="dd">wake</span>
      <div class="days">
        <span class="d on">M</span><span class="d on">T</span><span class="d on">W</span>
        <span class="d on">T</span><span class="d on">F</span><span class="d">S</span><span class="d">S</span>
      </div>
    </div>

    <svg class="graph" id="g" viewBox="0 0 480 180" preserveAspectRatio="none" aria-hidden="true">
      <line x1="40" y1="20"  x2="450" y2="20"  stroke="#d8ccb5" stroke-dasharray="2 5" stroke-width="1"/>
      <line x1="40" y1="90"  x2="450" y2="90"  stroke="#d8ccb5" stroke-dasharray="2 5" stroke-width="1"/>
      <line x1="40" y1="158" x2="450" y2="158" stroke="#d8ccb5" stroke-width="1.2"/>
      <text x="34" y="24"  text-anchor="end" fill="#8a7d6b" font-size="10">100%</text>
      <text x="34" y="161" text-anchor="end" fill="#8a7d6b" font-size="10">0%</text>
      <!-- cct dashed -->
      <path d="M60,150 L170,135 L300,70 L430,40" fill="none" stroke="#5a4a36" stroke-width="1.4" stroke-dasharray="4 3" opacity=".5"/>
      <!-- brightness -->
      <path d="M60,158 L170,150 L300,90 L430,22 L430,158 L60,158 Z" fill="#cc5500" opacity=".14"/>
      <path d="M60,158 L170,150 L300,90 L430,22" fill="none" stroke="#cc5500" stroke-width="2.6" stroke-linejoin="round"/>
      <g>
        <circle cx="60"  cy="158" r="6" fill="#ffb070" stroke="#fff" stroke-width="2"/>
        <circle cx="170" cy="150" r="6" fill="#ffd9a6" stroke="#fff" stroke-width="2"/>
        <circle cx="300" cy="90"  r="6" fill="#fff5d0" stroke="#fff" stroke-width="2"/>
        <circle cx="430" cy="22"  r="6" fill="#e9efff" stroke="#fff" stroke-width="2"/>
      </g>
      <text x="60"  y="174" text-anchor="middle" fill="#8a7d6b" font-size="10">06:30</text>
      <text x="430" y="174" text-anchor="middle" fill="#8a7d6b" font-size="10">07:00</text>
    </svg>
    <div class="legend">
      <span><i style="border-color:#cc5500"></i>Brightness</span>
      <span><i style="border-color:#5a4a36;border-top-style:dashed"></i>Colour temp</span>
    </div>

    <div class="wps">
      <div class="wp">
        <span class="dot" style="background:#ffb070"></span>
        <div class="f"><label>Time</label><input type="time" value="06:30"></div>
        <div class="f"><label>Bright</label><input value="0%"></div>
        <button class="del">✕</button>
      </div>
      <div class="wp">
        <span class="dot" style="background:#fff5d0"></span>
        <div class="f"><label>Time</label><input type="time" value="06:50"></div>
        <div class="f"><label>Bright</label><input value="40%"></div>
        <button class="del">✕</button>
      </div>
      <div class="wp">
        <span class="dot" style="background:#e9efff"></span>
        <div class="f"><label>Time</label><input type="time" value="07:00"></div>
        <div class="f"><label>Bright</label><input value="100%"></div>
        <button class="del">✕</button>
      </div>
    </div>
    <div class="actions">
      <button>＋ Point</button>
      <button>Reset to default</button>
      <button class="primary">Save</button>
    </div>
  </div>

  <details>
    <summary>Advanced</summary>
    <div class="adv">
      <div class="arow">Stay on after wake <span>15 min</span></div>
      <div class="arow">Add light effect <span>＋ Effect</span></div>
      <div class="arow">DMX address <span>1</span></div>
      <div class="arow">Fixture profile <span>Neewer PL60C</span></div>
    </div>
  </details>
</main>
<script>document.querySelectorAll('.d').forEach(d=>d.onclick=()=>d.classList.toggle('on'));</script>
</body>
</html>
