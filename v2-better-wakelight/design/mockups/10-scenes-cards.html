<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>10 · Scenes &amp; widgets</title>
<style>
  :root{
    --bg:#f5f0e8;--grad:#ecdfcd;--panel:#fdfaf4;--panel2:#f2ead9;
    --line:#e6dbc7;--line2:#d8ccb5;--text:#2b2620;--muted:#8a7d6b;
    --accent:#cc5500;--shadow:0 1px 2px rgba(58,43,24,.06),0 6px 18px rgba(58,43,24,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--text);
    background:radial-gradient(1200px 700px at 10% -10%,var(--grad),var(--bg) 55%) fixed;
    font:16px/1.5 -apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  main{max-width:480px;margin:0 auto;padding:max(env(safe-area-inset-top),22px) 16px 60px}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  h1{font:600 24px/1 ui-serif,Georgia,serif;margin:0}
  h1 .m{color:var(--accent);font-style:italic;font-weight:500}
  .lamp{font-size:13px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .w{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;
    box-shadow:var(--shadow)}
  .w.wide{grid-column:1 / -1}
  .wt{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;margin:0 0 8px}
  /* next alarm wide */
  .alarm{display:flex;align-items:center;gap:14px}
  .alarm .tm{font:600 40px/1 ui-rounded,system-ui;letter-spacing:-.02em}
  .alarm .info{flex:1}.alarm .info .dd{font-size:13px;color:var(--muted)}
  .alarm .days{display:flex;gap:5px;margin-top:7px}
  .d{font-size:10.5px;font-weight:700;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
    background:var(--panel2);color:var(--muted)}
  .d.on{background:var(--accent);color:#fff}
  .alarm .edit{color:var(--accent);font-size:13px;font-weight:600;text-decoration:none}
  .arc{width:100%;height:46px;margin-top:10px}
  /* power widget */
  .power{text-align:center}
  .glow{width:54px;height:54px;border-radius:50%;margin:2px auto 10px;
    background:radial-gradient(circle at 50% 40%,#fff3cf,#ffce63 45%,#cc5500 100%);
    box-shadow:0 0 0 7px rgba(255,206,99,.18),0 0 22px rgba(204,85,0,.3)}
  .power b{display:block;font-size:15px}.power span{font-size:12px;color:var(--muted)}
  .miniseg{display:flex;gap:5px;margin-top:12px}
  .miniseg button{flex:1;background:var(--panel2);border:1px solid var(--line2);color:var(--text);
    font:inherit;font-size:12.5px;font-weight:600;padding:8px 0;border-radius:9px;cursor:pointer}
  .miniseg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* brightness widget */
  .bright .big{font:600 34px/1 ui-rounded,system-ui;margin:2px 0 10px}
  .bright input{width:100%;accent-color:var(--accent);height:24px}
  /* scenes */
  .scenes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
  .sc{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 6px;text-align:center;cursor:pointer}
  .sc.on{background:#fbe9d8;border-color:var(--accent)}
  .sc .ic{font-size:22px}.sc .nm{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:5px}
</style>
</head>
<body>
<main>
  <div class="head"><h1>Wake<span class="m">light</span></h1><span class="lamp">Bedroom ▾</span></div>

  <div class="grid">
    <div class="w wide">
      <p class="wt">Next sunrise</p>
      <div class="alarm">
        <span class="tm">07:00</span>
        <div class="info">
          <div class="dd">Tomorrow · light from 06:30</div>
          <div class="days">
            <span class="d on">M</span><span class="d on">T</span><span class="d on">W</span>
            <span class="d on">T</span><span class="d on">F</span><span class="d">S</span><span class="d">S</span>
          </div>
        </div>
        <a class="edit" href="#">Edit ›</a>
      </div>
      <svg class="arc" viewBox="0 0 440 46" preserveAspectRatio="none">
        <path d="M0,44 C200,44 250,6 440,6" fill="none" stroke="#cc5500" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M0,44 C200,44 250,6 440,6 L440,46 L0,46 Z" fill="#cc5500" opacity=".12"/>
      </svg>
    </div>

    <div class="w power">
      <p class="wt">Lamp</p>
      <div class="glow"></div>
      <b>Sleeping</b><span>auto mode</span>
      <div class="miniseg"><button class="on">Auto</button><button>On</button><button>Off</button></div>
    </div>

    <div class="w bright">
      <p class="wt">Brightness</p>
      <div class="big" id="bv">0%</div>
      <input type="range" min="0" max="100" value="0" oninput="bv.textContent=this.value+'%'">
    </div>

    <div class="w wide">
      <p class="wt">Scenes</p>
      <div class="scenes">
        <div class="sc"><div class="ic">🌅</div><div class="nm">Sunrise</div></div>
        <div class="sc"><div class="ic">📖</div><div class="nm">Reading</div></div>
        <div class="sc"><div class="ic">🍽️</div><div class="nm">Dinner</div></div>
        <div class="sc"><div class="ic">🌙</div><div class="nm">Wind down</div></div>
        <div class="sc"><div class="ic">⛅</div><div class="nm">Daylight</div></div>
        <div class="sc"><div class="ic">✨</div><div class="nm">Effects</div></div>
      </div>
    </div>
  </div>
</main>
<script>
document.querySelectorAll('.miniseg button').forEach(b=>b.onclick=()=>{
  b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
document.querySelectorAll('.sc').forEach(s=>s.onclick=()=>s.classList.toggle('on'));
</script>
</body>
</html>
