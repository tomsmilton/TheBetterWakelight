<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>06 · Bedtime clock</title>
<style>
  :root{
    --bg:#15110d;--panel:#221c16;--panel2:#2c2419;--line:#3a3024;--text:#f3ede4;--muted:#9a8f80;
    --accent:#ffa94d;--accent2:#ffd43b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--text);
    background:radial-gradient(900px 600px at 50% -10%,#2a2014,#15110d 60%) fixed;
    font:16px/1.5 -apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  main{max-width:440px;margin:0 auto;padding:max(env(safe-area-inset-top),22px) 18px 60px}
  .head{display:flex;justify-content:space-between;align-items:center}
  h1{font:600 24px/1 ui-serif,Georgia,serif;margin:0}
  h1 .m{color:var(--accent);font-style:italic;font-weight:500}
  .lamp{font-size:13px;color:var(--muted)}
  .clockwrap{text-align:center;margin:14px 0 4px;user-select:none}
  .readout{margin-bottom:6px}
  .readout .lab{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
  .readout .big{font:600 50px/1 ui-rounded,system-ui;letter-spacing:-.02em;color:var(--accent2)}
  .readout .sub{font-size:13px;color:var(--muted);margin-top:2px}
  svg{display:block;margin:0 auto;touch-action:none}
  .ring-bg{fill:none;stroke:#2c2419;stroke-width:26}
  .ticks line{stroke:#3a3024;stroke-width:2}
  .knob{fill:var(--accent2);stroke:#15110d;stroke-width:3;cursor:grab}
  .days{display:flex;justify-content:center;gap:7px;margin:6px 0 2px}
  .p{font-size:12.5px;font-weight:700;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel2);color:var(--muted);cursor:pointer}
  .p.on{background:var(--accent);color:#15110d;border-color:var(--accent)}
  .cards{margin-top:16px}
  .card{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:14px 16px;margin-bottom:12px}
  .card .ic{font-size:20px}
  .card .t{flex:1}.card .t b{display:block;font-size:14px}.card .t span{font-size:12.5px;color:var(--muted)}
  .card input[type=range]{width:120px;accent-color:var(--accent)}
  .sw{--w:50px;--h:28px;position:relative;width:var(--w);height:var(--h);flex:0 0 var(--w)}
  .sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .sw .tr{position:absolute;inset:0;background:#3a3024;border-radius:99px;transition:.2s}
  .sw .kn{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked + .tr{background:var(--accent)}
  .sw input:checked + .tr + .kn{transform:translateX(22px)}
</style>
</head>
<body>
<main>
  <div class="head"><h1>Wake<span class="m">light</span></h1><span class="lamp">Bedroom ▾</span></div>

  <div class="clockwrap">
    <div class="readout">
      <div class="lab">Wake up</div>
      <div class="big" id="big">07:00</div>
      <div class="sub" id="sub">sunrise from 06:30 · 30 min</div>
    </div>
    <svg id="clock" viewBox="0 0 300 300" width="300" height="300">
      <circle class="ring-bg" cx="150" cy="150" r="120"/>
      <g class="ticks" id="ticks"></g>
      <!-- sunrise wedge arc -->
      <path id="wedge" fill="none" stroke-width="26" stroke-linecap="round"/>
      <defs>
        <linearGradient id="sun" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#7a4a1a"/><stop offset="1" stop-color="#ffd43b"/>
        </linearGradient>
      </defs>
      <circle id="start" class="knob" r="13"/>
      <circle id="end" class="knob" r="15" fill="#ffd43b"/>
      <text x="150" y="60" text-anchor="middle" fill="#5a4f42" font-size="11">24h</text>
      <text x="150" y="248" text-anchor="middle" fill="#5a4f42" font-size="11">12h</text>
    </svg>
    <div class="days">
      <button class="p on">M</button><button class="p on">T</button><button class="p on">W</button>
      <button class="p on">T</button><button class="p on">F</button><button class="p">S</button><button class="p">S</button>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <span class="ic">☀️</span>
      <div class="t"><b>Sunrise length</b><span id="lenlab">30 minutes</span></div>
      <input type="range" min="5" max="60" value="30" oninput="document.getElementById('lenlab').textContent=this.value+' minutes'">
    </div>
    <div class="card">
      <span class="ic">🔔</span>
      <div class="t"><b>Alarm armed</b><span>resumes tomorrow if off</span></div>
      <label class="sw"><input type="checkbox" checked><span class="tr"></span><span class="kn"></span></label>
    </div>
  </div>
</main>
<script>
const cx=150,cy=150,R=120;
const ticks=document.getElementById('ticks');
for(let i=0;i<24;i++){const a=(i/24)*2*Math.PI - Math.PI/2;
  const x1=cx+Math.cos(a)*138,y1=cy+Math.sin(a)*138,x2=cx+Math.cos(a)*(i%6===0?146:142),y2=cy+Math.sin(a)*(i%6===0?146:142);
  ticks.innerHTML+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke-width="${i%6===0?3:1.5}"/>`;}
function ang(min){return (min/1440)*2*Math.PI - Math.PI/2;}
function pt(min,r){const a=ang(min);return [cx+Math.cos(a)*r,cy+Math.sin(a)*r];}
let startMin=6*60+30, endMin=7*60;
function arcPath(a0,a1,r){const x0=cx+Math.cos(a0)*r,y0=cy+Math.sin(a0)*r,x1=cx+Math.cos(a1)*r,y1=cy+Math.sin(a1)*r;
  let d=(a1-a0+2*Math.PI)%(2*Math.PI);const large=d>Math.PI?1:0;return `M${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1}`;}
function fmt(min){min=((min%1440)+1440)%1440;const h=Math.floor(min/60),m=min%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function draw(){
  document.getElementById('wedge').setAttribute('d',arcPath(ang(startMin),ang(endMin),R));
  document.getElementById('wedge').setAttribute('stroke','url(#sun)');
  const s=pt(startMin,R),e=pt(endMin,R);
  document.getElementById('start').setAttribute('cx',s[0]);document.getElementById('start').setAttribute('cy',s[1]);
  document.getElementById('end').setAttribute('cx',e[0]);document.getElementById('end').setAttribute('cy',e[1]);
  document.getElementById('big').textContent=fmt(endMin);
  const len=((endMin-startMin)+1440)%1440;
  document.getElementById('sub').textContent='sunrise from '+fmt(startMin)+' · '+len+' min';
}
function drag(el,setter){el.addEventListener('pointerdown',ev=>{ev.preventDefault();
  const svg=document.getElementById('clock');
  const move=e=>{const r=svg.getBoundingClientRect();const px=(e.clientX-r.left)/r.width*300-cx,py=(e.clientY-r.top)/r.height*300-cy;
    let a=Math.atan2(py,px)+Math.PI/2;a=(a+2*Math.PI)%(2*Math.PI);let min=Math.round(a/(2*Math.PI)*1440/5)*5;setter(min);draw();};
  const up=()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up)};
  addEventListener('pointermove',move);addEventListener('pointerup',up);});}
drag(document.getElementById('end'),m=>{endMin=m;});
drag(document.getElementById('start'),m=>{startMin=m;});
draw();
document.querySelectorAll('.p').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
</script>
</body>
</html>
