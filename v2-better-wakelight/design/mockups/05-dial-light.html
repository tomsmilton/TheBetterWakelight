<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>05 · Light dial</title>
<style>
  :root{
    --bg:#f5f0e8;--grad:#ecdfcd;--panel:#fdfaf4;--panel2:#f2ead9;
    --line:#e6dbc7;--line2:#d8ccb5;--text:#2b2620;--muted:#8a7d6b;
    --accent:#cc5500;--shadow:0 1px 2px rgba(58,43,24,.06),0 8px 22px rgba(58,43,24,.09);
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--text);
    background:radial-gradient(1200px 700px at 50% -10%,var(--grad),var(--bg) 55%) fixed;
    font:16px/1.5 -apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  main{max-width:440px;margin:0 auto;padding:max(env(safe-area-inset-top),22px) 18px 60px}
  .head{display:flex;justify-content:space-between;align-items:center}
  h1{font:600 24px/1 ui-serif,Georgia,serif;margin:0}
  h1 .m{color:var(--accent);font-style:italic;font-weight:500}
  .lamp{font-size:13px;color:var(--muted)}
  .dialwrap{text-align:center;margin:18px 0 6px;position:relative}
  .dial{width:260px;height:260px;margin:0 auto;position:relative;cursor:pointer;user-select:none}
  .read{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
  .read .pct{font:600 56px/1 ui-rounded,system-ui;letter-spacing:-.03em}
  .read .cct{font-size:14px;color:var(--muted);margin-top:6px}
  .hint{font-size:12.5px;color:var(--muted);margin-top:10px}
  .ctl{margin-top:22px}
  .ctl .lab{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px}
  .ctl .lab b{color:var(--text)}
  .temp{position:relative;height:30px;border-radius:99px;border:1px solid var(--line2);
    background:linear-gradient(90deg,#ffb070,#ffe6b8,#fff5e0,#eaf0ff,#cfe0ff)}
  .temp .kn{position:absolute;top:50%;width:26px;height:26px;border-radius:50%;background:#fff;
    border:2px solid var(--accent);transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.2);left:35%}
  .scenes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:24px}
  .sc{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center;
    cursor:pointer;box-shadow:var(--shadow)}
  .sc .ic{font-size:20px}
  .sc .nm{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:600}
  .sc.on{border-color:var(--accent);background:#fbe9d8}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
  .foot .t b{display:block;font-size:14px}.foot .t span{font-size:12.5px;color:var(--muted)}
  .foot a{color:var(--accent);font-size:13px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<main>
  <div class="head"><h1>Wake<span class="m">light</span></h1><span class="lamp">Bedroom ▾</span></div>

  <div class="dialwrap">
    <div class="dial" id="dial">
      <svg viewBox="0 0 260 260" width="260" height="260">
        <circle cx="130" cy="130" r="112" fill="none" stroke="#e6dbc7" stroke-width="18"/>
        <circle id="arc" cx="130" cy="130" r="112" fill="none" stroke="#cc5500" stroke-width="18"
          stroke-linecap="round" stroke-dasharray="703" stroke-dashoffset="246"
          transform="rotate(-90 130 130)"/>
        <circle cx="130" cy="130" r="92"
          fill="radial-gradient(#fff,#fff)"/>
      </svg>
      <div class="read">
        <div class="pct" id="pct">65%</div>
        <div class="cct" id="cctlab">warm white · 3000K</div>
      </div>
    </div>
    <div class="hint">drag the ring to dim · tap centre to toggle</div>
  </div>

  <div class="ctl">
    <div class="lab"><span>Colour temperature</span><b id="cv">3000K</b></div>
    <div class="temp" id="temp"><div class="kn" id="kn"></div></div>
  </div>

  <div class="scenes">
    <div class="sc on"><div class="ic">🌅</div><div class="nm">Wake</div></div>
    <div class="sc"><div class="ic">📖</div><div class="nm">Reading</div></div>
    <div class="sc"><div class="ic">🌙</div><div class="nm">Relax</div></div>
    <div class="sc"><div class="ic">⛅</div><div class="nm">Daylight</div></div>
  </div>

  <div class="foot">
    <div class="t"><b>Morning sunrise</b><span>07:00 · Mon–Fri · armed</span></div>
    <a href="#">Schedule →</a>
  </div>
</main>
<script>
const arc=document.getElementById('arc'),pct=document.getElementById('pct');
const C=703;
function setPct(p){pct.textContent=p+'%';arc.style.strokeDashoffset=C-(C*p/100);}
let v=65;setPct(65);
document.getElementById('dial').addEventListener('click',e=>{
  // simple demo: clicking upper half raises, lower lowers
  const r=e.currentTarget.getBoundingClientRect();
  v=Math.max(0,Math.min(100, Math.round(100*(1-(e.clientY-r.top)/r.height))));
  setPct(v);
});
const temp=document.getElementById('temp'),kn=document.getElementById('kn'),cv=document.getElementById('cv'),cctlab=document.getElementById('cctlab');
function setTemp(x){x=Math.max(0,Math.min(1,x));kn.style.left=(x*100)+'%';
  const k=Math.round(2500+x*4000);cv.textContent=k+'K';
  cctlab.textContent=(k<3300?'warm white':k<4500?'soft white':k<5500?'neutral':'cool daylight')+' · '+k+'K';}
temp.addEventListener('pointerdown',e=>{const move=ev=>{const r=temp.getBoundingClientRect();setTemp((ev.clientX-r.left)/r.width)};
  move(e);const up=()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up)};
  addEventListener('pointermove',move);addEventListener('pointerup',up);});
setTemp(.12);
document.querySelectorAll('.sc').forEach(s=>s.onclick=()=>{document.querySelectorAll('.sc').forEach(x=>x.classList.remove('on'));s.classList.add('on');});
</script>
</body>
</html>
