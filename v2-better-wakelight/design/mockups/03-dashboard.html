<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>03 · Dashboard</title>
<style>
  :root{
    --bg:#f5f0e8;--grad:#ecdfcd;--panel:#fdfaf4;--panel2:#f2ead9;
    --line:#e6dbc7;--line2:#d8ccb5;--text:#2b2620;--muted:#8a7d6b;
    --accent:#cc5500;--good:#6a8f3a;--shadow:0 1px 2px rgba(58,43,24,.06),0 6px 18px rgba(58,43,24,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--text);
    background:radial-gradient(1200px 700px at 10% -10%,var(--grad),var(--bg) 55%) fixed;
    font:16px/1.5 -apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  main{max-width:460px;margin:0 auto;padding:max(env(safe-area-inset-top),22px) 18px 60px}
  .head{display:flex;justify-content:space-between;align-items:center}
  h1{font:600 24px/1 ui-serif,Georgia,serif;margin:0}
  h1 .m{color:var(--accent);font-style:italic;font-weight:500}
  .lamp{font-size:13px;color:var(--muted)}
  /* status hero */
  .state{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;
    box-shadow:var(--shadow);margin:16px 0 14px;text-align:center}
  .glow{width:84px;height:84px;border-radius:50%;margin:4px auto 12px;
    background:radial-gradient(circle at 50% 40%,#fff3cf,#ffce63 45%,#cc5500 100%);
    box-shadow:0 0 0 10px rgba(255,206,99,.18),0 0 36px rgba(204,85,0,.35)}
  .state .lab{font:600 22px/1.1 ui-serif,Georgia,serif}
  .state .sub{color:var(--muted);font-size:13.5px;margin-top:4px}
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
  .seg button{background:var(--panel2);border:1px solid var(--line2);color:var(--text);
    font:inherit;font-weight:600;padding:13px;border-radius:12px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 10px rgba(204,85,0,.22)}
  /* cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px 18px;
    box-shadow:var(--shadow);margin-bottom:14px}
  .ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .ct h2{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:0;font-weight:700}
  .ct a{font-size:13px;color:var(--accent);text-decoration:none;font-weight:600}
  .alarm{display:flex;align-items:baseline;gap:10px}
  .alarm .tm{font:600 30px/1 ui-rounded,system-ui;letter-spacing:-.02em}
  .alarm .dd{font-size:13px;color:var(--muted)}
  .alarm .badge{margin-left:auto;font-size:12px;color:var(--accent);background:#fbe9d8;border:1px solid #f3d4b6;
    padding:3px 9px;border-radius:99px}
  .quick label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin:10px 0 6px}
  .quick label b{color:var(--text)}
  input[type=range]{width:100%;accent-color:var(--accent);height:26px}
  .ramp{display:block;width:100%;height:60px}
</style>
</head>
<body>
<main>
  <div class="head"><h1>Wake<span class="m">light</span></h1><span class="lamp">Bedroom ▾</span></div>

  <div class="state">
    <div class="glow"></div>
    <div class="lab">Sleeping</div>
    <div class="sub">Schedule armed · sunrise begins 06:30</div>
    <div class="seg">
      <button class="on">Auto</button>
      <button>On now</button>
      <button>Off</button>
    </div>
  </div>

  <div class="card">
    <div class="ct"><h2>Next alarm</h2><a href="#">Edit ›</a></div>
    <div class="alarm">
      <span class="tm">07:00</span>
      <span class="dd">Mon–Fri</span>
      <span class="badge">☀ 30 min</span>
    </div>
    <svg class="ramp" viewBox="0 0 320 60" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,58 C140,58 180,8 320,8" fill="none" stroke="#cc5500" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M0,58 C140,58 180,8 320,8 L320,60 L0,60 Z" fill="#cc5500" opacity=".12"/>
    </svg>
  </div>

  <div class="card quick">
    <div class="ct"><h2>Light it now</h2><a href="#">Colour ›</a></div>
    <label>Brightness <b id="bv">0%</b></label>
    <input type="range" min="0" max="100" value="0" oninput="bv.textContent=this.value+'%'">
    <label>Warmth <b id="cv">3000K</b></label>
    <input type="range" min="2500" max="6500" step="100" value="3000" oninput="cv.textContent=this.value+'K'">
  </div>
</main>
<script>document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});</script>
</body>
</html>
