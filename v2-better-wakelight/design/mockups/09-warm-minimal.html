<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>09 · Warm minimal</title>
<style>
  :root{
    --bg:#f7f2ea;--grad:#efe3d2;--text:#2b2620;--muted:#9a8d79;--faint:#b8ab95;
    --line:#e3d8c4;--accent:#cc5500;
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--text);
    background:radial-gradient(1100px 700px at 50% -20%,var(--grad),var(--bg) 55%) fixed;
    font:17px/1.55 ui-serif,"Iowan Old Style","Apple Garamond",Georgia,serif;-webkit-font-smoothing:antialiased}
  main{max-width:420px;margin:0 auto;padding:max(env(safe-area-inset-top),40px) 26px 60px}
  .brand{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);
    font-family:-apple-system,system-ui,sans-serif;font-weight:700;margin-bottom:34px}
  .brand b{color:var(--accent)}
  .lead{font-size:15px;color:var(--muted);font-family:-apple-system,system-ui,sans-serif;margin-bottom:4px}
  .wake{font-size:74px;line-height:1;letter-spacing:-.03em;margin:0 0 4px;font-weight:600}
  .meta{color:var(--muted);font-size:15px;margin-bottom:30px}
  .rule{height:1px;background:var(--line);margin:26px 0}
  .field{display:flex;justify-content:space-between;align-items:center;
    font-family:-apple-system,system-ui,sans-serif}
  .field + .field{margin-top:22px}
  .field .k{color:var(--muted);font-size:14px}
  .field .v{font-size:16px;font-weight:600}
  .days{display:flex;gap:7px}
  .d{font-size:12.5px;font-weight:700;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
    background:transparent;border:1px solid var(--line);color:var(--faint);cursor:pointer;
    font-family:-apple-system,system-ui,sans-serif}
  .d.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  input[type=time]{font:inherit;font-family:-apple-system,system-ui,sans-serif;font-size:16px;font-weight:600;
    border:0;background:transparent;color:var(--text);text-align:right}
  input[type=range]{accent-color:var(--accent);width:150px}
  .toggle{display:flex;gap:8px;background:#efe5d4;border-radius:99px;padding:4px;
    font-family:-apple-system,system-ui,sans-serif}
  .toggle button{border:0;background:transparent;font:inherit;font-size:14px;font-weight:600;color:var(--muted);
    padding:8px 16px;border-radius:99px;cursor:pointer}
  .toggle button.on{background:var(--accent);color:#fff}
  details{margin-top:28px;font-family:-apple-system,system-ui,sans-serif}
  summary{cursor:pointer;color:var(--accent);font-size:14px;font-weight:600;list-style:none}
  summary::-webkit-details-marker{display:none}
  .adv{margin-top:18px}
  .save{display:block;width:100%;margin-top:34px;background:var(--accent);color:#fff;border:0;
    border-radius:14px;padding:16px;font:600 16px/1 -apple-system,system-ui,sans-serif;cursor:pointer;
    box-shadow:0 2px 14px rgba(204,85,0,.22)}
</style>
</head>
<body>
<main>
  <div class="brand">Wake<b>light</b> · Bedroom</div>

  <div class="lead">Tomorrow you wake at</div>
  <div class="wake">07:00</div>
  <div class="meta">a gentle sunrise begins 06:30</div>

  <div class="toggle" style="width:fit-content">
    <button class="on">Auto</button><button>On</button><button>Off</button>
  </div>

  <div class="rule"></div>

  <div class="field"><span class="k">Wake time</span><input type="time" value="07:00"></div>
  <div class="field"><span class="k">Repeat</span>
    <div class="days">
      <span class="d on">M</span><span class="d on">T</span><span class="d on">W</span>
      <span class="d on">T</span><span class="d on">F</span><span class="d">S</span><span class="d">S</span>
    </div>
  </div>
  <div class="field"><span class="k">Sunrise length</span>
    <span class="v"><input type="range" min="5" max="60" value="30" oninput="this.nextElementSibling.textContent=this.value+' min'"> <span style="display:none"></span></span>
  </div>

  <details>
    <summary>Advanced settings</summary>
    <div class="adv">
      <div class="field"><span class="k">Final brightness</span><input type="range" min="20" max="100" value="100"></div>
      <div class="field" style="margin-top:22px"><span class="k">Stay on after</span><input type="range" min="0" max="60" value="15"></div>
      <div class="field" style="margin-top:22px"><span class="k">Light effects</span><span class="v" style="color:var(--accent)">Manage ›</span></div>
      <div class="field" style="margin-top:22px"><span class="k">Fixture / DMX</span><span class="v" style="color:var(--accent)">Setup ›</span></div>
    </div>
  </details>

  <button class="save">Save</button>
</main>
<script>
document.querySelectorAll('.d').forEach(d=>d.onclick=()=>d.classList.toggle('on'));
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{
  b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
</script>
</body>
</html>
